<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="580" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>No Black Box</title>
<desc>A faint cool blue-grey data field on a Dark Blue ground. A horizontal warm gold spine of connected nodes runs the full width, fully exposed. Three clean gold traces link nodes on the spine to specific pale gold signal points out in the field, and a pale gold diamond at the right marks the resolved output.</desc>
<defs>
<pattern id="fieldFaint" patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="translate(21,15)"><circle cx="11" cy="11" r="1.6" fill="#637890" fill-opacity="0.5"/></pattern>
</defs>
<rect x="0" y="0" width="680" height="580" fill="#34416D"/>
<rect x="44" y="44" width="592" height="492" fill="url(#fieldFaint)"/>

<line x1="340" y1="158" x2="340" y2="284" stroke="#C4A25B" stroke-width="1.5"/>
<line x1="210" y1="440" x2="210" y2="296" stroke="#C4A25B" stroke-width="1.5"/>
<line x1="470" y1="452" x2="470" y2="296" stroke="#C4A25B" stroke-width="1.5"/>

<line x1="80" y1="290" x2="600" y2="290" stroke="#C4A25B" stroke-width="2"/>

<circle cx="80" cy="290" r="5" fill="#C4A25B"/>
<circle cx="210" cy="290" r="5" fill="#C4A25B"/>
<circle cx="340" cy="290" r="5" fill="#C4A25B"/>
