<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="560" viewBox="0 0 1440 560" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Paradigm hero — animated data field</title>
<desc>A dark blue hero background. Cool points span the full width; a warm gold leadership bloom slowly drifts and loops on the right, with a soft scrim darkening the left so headline copy stays readable.</desc>
<style>
.bloom{animation:drift 22s ease-in-out infinite;}
@keyframes drift{0%{transform:translate(0px,0px);}25%{transform:translate(-42px,36px);}50%{transform:translate(27px,63px);}75%{transform:translate(-12px,-27px);}100%{transform:translate(0px,0px);}}
.core{animation:pulse 6.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.72;}}
@media (prefers-reduced-motion: reduce){.bloom,.core{animation:none;}}
</style>
<defs>
<pattern id="hCool" patternUnits="userSpaceOnUse" width="24" height="24"><circle cx="12" cy="12" r="1.9" fill="#637890"/></pattern>
<pattern id="hGold" patternUnits="userSpaceOnUse" width="24" height="24"><circle cx="12" cy="12" r="2.6" fill="#C4A25B"/></pattern>
<pattern id="hBright" patternUnits="userSpaceOnUse" width="24" height="24"><circle cx="12" cy="12" r="2.9" fill="#EDE0C4"/></pattern>
<linearGradient id="hScrim" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#34416D" stop-opacity="0.6"/>
<stop offset="0.5" stop-color="#34416D" stop-opacity="0"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="1440" height="560" fill="#34416D"/>
<rect x="0" y="0" width="1440" height="560" fill="url(#hCool)" opacity="0.85"/>
<g class="bloom">
<ellipse cx="720" cy="280" rx="260" ry="210" fill="#C4A25B" opacity="0.12"/>
<ellipse cx="720" cy="280" rx="210" ry="168" fill="url(#hGold)"/>
<ellipse class="core" cx="720" cy="280" rx="92" ry="72" fill="url(#hBright)"/>
</g>
</svg>
